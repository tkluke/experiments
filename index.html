<!doctype html>
<html lang="en">
<head>
 <meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b0f19" />

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
  crossorigin=""
/>
  />
 <style>
  /* 1) CSS Reset + Mobile-friendly base */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    line-height: 1.4;
    color: #111;
    background: #fff;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
  }

  /* Respect iOS notch / Android cutouts */
  :root {
    --safe-top: env(safe-area-inset-top);
    --safe-right: env(safe-area-inset-right);
    --safe-bottom: env(safe-area-inset-bottom);
    --safe-left: env(safe-area-inset-left);

    /* Brand + UI colors */
    --brand: #0b5ed7;
    --accent: #d63384;

    --bg: #ffffff;
    --surface: #f7f7f9;
    --border: #e5e7eb;
    --text: #0f172a;
    --text-muted: #6b7280;

    --radius: 12px;

    /* Fluid sizes for small → large screens */
    --space-1: clamp(6px, 1.2vw, 8px);
    --space-2: clamp(10px, 1.8vw, 12px);
    --space-3: clamp(12px, 2.4vw, 16px);
    --space-4: clamp(16px, 3vw, 20px);
    --control-height: 44px;
  }

  /* Dark mode */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b0f19;
      --surface: #121826;
      --border: #1f2937;
      --text: #e5e7eb;
      --text-muted: #9ca3af;
    }
    body { color: var(--text); background: var(--bg); }
  }

  /* 2) Layout */
  .app {
    min-height: 100dvh; /* modern viewport unit */
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 0;
    background: var(--bg);
    padding-left: max(var(--space-2), var(--safe-left));
    padding-right: max(var(--space-2), var(--safe-right));
    padding-top: max(var(--space-2), var(--safe-top));
    padding-bottom: max(0px, var(--safe-bottom));
  }

  /* Map uses most of the screen on mobile */
  #map {
    height: 58vh; /* default phone layout */
    border-radius: var(--radius);
    overflow: hidden;
    outline: 1px solid var(--border);
    background: #dcdcdc;
  }

  /* On taller devices or landscape, give map more room */
  @media (min-height: 700px) {
    #map { height: 62vh; }
  }
  @media (orientation: landscape) and (max-height: 500px) {
    #map { height: 70vh; }
  }

  /* 3) Controls container (sticky) */
  .controls {
    position: sticky;
    bottom: 0;
    z-index: 500; /* above map markers popups */
    display: grid;
    gap: var(--space-3);
    padding: var(--space-3);
    margin-top: var(--space-3);
    background: color-mix(in oklab, var(--bg) 92%, transparent);
    backdrop-filter: saturate(1.1) blur(6px);
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }

  /* Cards/fieldsets */
  fieldset {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: var(--space-3);
    background: var(--surface);
    min-inline-size: 0;
  }
  legend {
    padding: 0 var(--space-2);
    font-weight: 650;
    color: var(--text);
  }

  /* 4) Inputs + Buttons */
  label {
    display: block;
    font-size: 0.92rem;
    margin-bottom: 4px;
    color: var(--text);
  }
  input[type="number"] {
    width: 100%;
    height: var(--control-height);
    padding: 0 var(--space-2);
    border-radius: calc(var(--radius) - 4px);
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    outline: none;
  }
  input[type="number"]:focus {
    border-color: color-mix(in oklab, var(--brand) 70%, var(--border));
    box-shadow: 0 0 0 3px color-mix(in oklab, var(--brand) 20%, transparent);
  }

  button {
    height: var(--control-height);
    border: none;
    border-radius: calc(var(--radius) - 4px);
    background: var(--brand);
    color: #fff;
    font-weight: 600;
    letter-spacing: 0.2px;
    padding: 0 var(--space-3);
    touch-action: manipulation;
  }
  button:disabled {
    opacity: 0.55;
    filter: grayscale(0.1);
  }
  .btn-secondary {
    background: color-mix(in oklab, var(--brand) 20%, var(--surface));
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost {
    background: transparent;
    color: var(--text);
    border: 1px dashed var(--border);
  }

  /* Grid rows for buttons */
  .row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: var(--space-2);
  }
  /* On narrow screens, stack buttons in 2 columns to keep them tappable */
  @media (max-width: 440px) {
    .row { grid-template-columns: 1fr 1fr; }
  }

  /* Control groups layout */
  .controls {
    grid-template-columns: 1fr;
  }
  @media (min-width: 720px) {
    .controls { grid-template-columns: 1fr 1fr; }
  }

  .note {
    font-size: 0.86rem;
    color: var(--text-muted);
    margin: 6px 0 0 0;
  }

  /* 5) Collapsible sections on very small screens */
  details.collapsible {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: var(--space-2);
  }
  details.collapsible > summary {
    cursor: pointer;
    list-style: none;
    font-weight: 650;
    padding: var(--space-2);
    border-radius: calc(var(--radius) - 4px);
    outline: none;
  }
  details.collapsible > summary::-webkit-details-marker { display: none; }
  details.collapsible[open] { padding-bottom: var(--space-3); }

  /* 6) Leaflet theme fits dark mode */
  .leaflet-container a { color: var(--brand); }
  .leaflet-popup-content-wrapper, .leaflet-popup-tip {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .leaflet-control-attribution {
    background: color-mix(in oklab, var(--bg) 80%, transparent) !important;
    color: var(--text-muted) !important;
    padding: 2px 6px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  /* 7) iOS Safari viewport quirks: ensure full height usage */
  @supports (-webkit-touch-callout: none) {
    .app { min-height: -webkit-fill-available; }
  }
</style>
</head>
<body>
  <div class="app">
    <div id="map"></div>

    <!-- Use either fieldsets OR collapsible details for small phones.
         You can keep both; details are shown below as an example. -->

    <div class="controls">
      <fieldset>
        <legend>Live Location</legend>
        <div class="row">
          <button id="start">Start Tracking</button>
          <button id="stop" class="btn-secondary" disabled>Stop</button>
          <button id="recenter" class="btn-ghost" disabled>Recenter</button>
        </div>
        <p class="note" id="status">Status: idle</p>
      </fieldset>

      <fieldset>
        <legend>Add Circle</legend>
        <label>Center Latitude
          <input type="number" step="any" id="circle-lat" placeholder="e.g., 43.8561" />
        </label>
        <label>Center Longitude
          <input type="number" step="any" id="circle-lng" placeholder="-79.3370" />
        </label>
        <label>Radius (meters)
          <input type="number" step="1" id="circle-radius" placeholder="100" value="100" />
        </label>
        <div class="row">
          <button id="use-my-pos" class="btn-secondary" disabled>Use My Position</button>
          <button id="add-circle">Add Circle</button>
          <button id="clear-circles" class="btn-ghost">Clear Circles</button>
        </div>
        <p class="note">Tip: Long‑press on the map to add a circle at that spot.</p>
      </fieldset>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>

  <!-- Your existing script block stays as-is -->
</body>
</html>

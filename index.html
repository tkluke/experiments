<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b0f19" />
  <title>My GPS Map with Geofences</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    /* 1) CSS Reset + Mobile-friendly base */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      line-height: 1.4;
      color: #111;
      background: #fff;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    /* Respect iOS notch / Android cutouts */
    :root {
      --safe-top: env(safe-area-inset-top);
      --safe-right: env(safe-area-inset-right);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);

      /* Brand + UI colors */
      --brand: #0b5ed7;
      --accent: #d63384;

      --bg: #ffffff;
      --surface: #f7f7f9;
      --border: #e5e7eb;
      --text: #0f172a;
      --text-muted: #6b7280;

      --radius: 12px;

      /* Fluid sizes for small → large screens */
      --space-1: clamp(6px, 1.2vw, 8px);
      --space-2: clamp(10px, 1.8vw, 12px);
      --space-3: clamp(12px, 2.4vw, 16px);
      --space-4: clamp(16px, 3vw, 20px);
      --control-height: 44px;
    }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0f19;
        --surface: #121826;
        --border: #1f2937;
        --text: #e5e7eb;
        --text-muted: #9ca3af;
      }
      body { color: var(--text); background: var(--bg); }
    }

    /* 2) Layout */
    .app {
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 0;
      background: var(--bg);
      padding-left: max(var(--space-2), var(--safe-left));
      padding-right: max(var(--space-2), var(--safe-right));
      padding-top: max(var(--space-2), var(--safe-top));
      padding-bottom: max(0px, var(--safe-bottom));
    }

    /* Map: ensure at least half the device height, aim for more on phones */
    #map {
      height: 65dvh;        /* primary target on phones */
      min-height: 50dvh;    /* never below half the screen */
      border-radius: var(--radius);
      overflow: hidden;
      outline: 1px solid var(--border);
      background: #dcdcdc;
    }
    @media (min-height: 700px) {
      #map { height: 68dvh; }
    }
    @media (orientation: landscape) and (max-height: 500px) {
      #map { height: 72dvh; }
    }
    @supports not (height: 1dvh) {
      #map {
        height: 65vh;
        min-height: 50vh;
      }
    }

    /* 3) Controls container (sticky) */
    .controls {
      position: sticky;
      bottom: 0;
      z-index: 500;
      display: grid;
      gap: var(--space-3);
      padding: var(--space-3);
      margin-top: var(--space-3);
      background: color-mix(in oklab, var(--bg) 92%, transparent);
      backdrop-filter: saturate(1.1) blur(6px);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      grid-template-columns: 1fr;
    }
    @media (min-width: 720px) {
      .controls { grid-template-columns: 1fr 1fr; }
    }

    /* Cards/fieldsets */
    fieldset {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--space-3);
      background: var(--surface);
      min-inline-size: 0;
    }
    legend {
      padding: 0 var(--space-2);
      font-weight: 650;
      color: var(--text);
    }

    /* Inputs + Buttons */
    label {
      display: block;
      font-size: 0.92rem;
      margin-bottom: 4px;
      color: var(--text);
    }
    input[type="number"] {
      width: 100%;
      height: var(--control-height);
      padding: 0 var(--space-2);
      border-radius: calc(var(--radius) - 4px);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      outline: none;
      appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"]:focus {
      border-color: color-mix(in oklab, var(--brand) 70%, var(--border));
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--brand) 20%, transparent);
    }

    button {
      height: var(--control-height);
      border: none;
      border-radius: calc(var(--radius) - 4px);
      background: var(--brand);
      color: #fff;
      font-weight: 600;
      letter-spacing: 0.2px;
      padding: 0 var(--space-3);
      touch-action: manipulation;
    }
    button:disabled {
      opacity: 0.55;
      filter: grayscale(0.1);
    }
    .btn-secondary {
      background: color-mix(in oklab, var(--brand) 20%, var(--surface));
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost {
      background: transparent;
      color: var(--text);
      border: 1px dashed var(--border);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: var(--space-2);
    }
    @media (max-width: 440px) {
      .row { grid-template-columns: 1fr 1fr; }
    }

    .note {
      font-size: 0.86rem;
      color: var(--text-muted);
      margin: 6px 0 0 0;
    }

    /* Leaflet theme in dark mode */
    .leaflet-container a { color: var(--brand); }
    .leaflet-popup-content-wrapper, .leaflet-popup-tip {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .leaflet-control-attribution {
      background: color-mix(in oklab, var(--bg) 80%, transparent) !important;
      color: var(--text-muted) !important;
      padding: 2px 6px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    @supports (-webkit-touch-callout: none) {
      .app { min-height: -webkit-fill-available; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="map"></div>

    <div class="controls">
      <fieldset>
        <legend>Live Location</legend>
        <div class="row">
          <button id="start">Start Tracking</button>
          <button id="stop" class="btn-secondary" disabled>Stop</button>
          <button id="recenter" class="btn-ghost" disabled>Recenter</button>
        </div>
        <p class="note" id="status">Status: idle</p>
      </fieldset>

      <fieldset>
        <legend>Add Circle</legend>
        <label>Center Latitude
          <input type="number" step="any" id="circle-lat" placeholder="e.g., 43.8561" />
        </label>
        <label>Center Longitude
          <input type="number" step="any" id="circle-lng" placeholder="-79.3370" />
        </label>
        <label>Radius (meters)
          <input type="number" step="1" id="circle-radius" placeholder="100" value="100" />
        </label>
        <div class="row">
          <button id="use-my-pos" class="btn-secondary" disabled>Use My Position</button>
          <button id="add-circle">Add Circle</button>
          <button id="clear-circles" class="btn-ghost">Clear Circles</button>
        </div>
        <p class="note">Tip: Long‑press on the map to add a circle at that spot.</p>
      </fieldset>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    // --- Map setup ---
    const map = L.map('map');
    L.tileLayer(
      'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }
    ).addTo(map);

    // Default view (Markham area as a fallback)
    map.setView([43.8561, -79.3370], 13);

    // --- Live location layers ---
    let watchId = null;
    let userMarker = null;         // Dot showing current position
    let accuracyCircle = null;     // Circle showing reported accuracy
    let headingArrow = null;       // Small polyline to show heading

    // --- Geofence circles ---
    const geofenceGroup = L.featureGroup().addTo(map);

    // Controls
    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('start');
    const stopBtn = document.getElementById('stop');
    const recenterBtn = document.getElementById('recenter');
    const useMyPosBtn = document.getElementById('use-my-pos');
    const latInput = document.getElementById('circle-lat');
    const lngInput = document.getElementById('circle-lng');
    const radiusInput = document.getElementById('circle-radius');
    const addCircleBtn = document.getElementById('add-circle');
    const clearCirclesBtn = document.getElementById('clear-circles');

    // Helper: set status text
    function setStatus(msg) { statusEl.textContent = 'Status: ' + msg; }

    // Compute destination point given start lat/lng, bearing (deg), distance (m).
    function destinationPoint(lat, lng, bearingDeg, distanceMeters) {
      const R = 6371000; // earth radius (m)
      const φ1 = lat * Math.PI/180;
      const λ1 = lng * Math.PI/180;
      const θ = bearingDeg * Math.PI/180;
      const δ = distanceMeters / R;

      const sinφ1 = Math.sin(φ1), cosφ1 = Math.cos(φ1);
      const sinδ = Math.sin(δ), cosδ = Math.cos(δ);

      const sinφ2 = sinφ1 * cosδ + cosφ1 * sinδ * Math.cos(θ);
      const φ2 = Math.asin(sinφ2);
      const y = Math.sin(θ) * sinδ * cosφ1;
      const x = cosδ - sinφ1 * sinφ2;
      const λ2 = λ1 + Math.atan2(y, x);

      return { lat: φ2 * 180/Math.PI, lng: ((λ2 * 180/Math.PI + 540) % 360) - 180 };
    }

    // Helper: create or update user layers
    function updateUserPosition(pos) {
      const { latitude, longitude, accuracy, heading, speed } = pos.coords;
      const latlng = [latitude, longitude];

      if (!userMarker) {
        userMarker = L.circleMarker(latlng, {
          radius: 7,
          color: '#0b5ed7',
          fillColor: '#0b5ed7',
          fillOpacity: 1
        }).addTo(map);

        accuracyCircle = L.circle(latlng, {
          radius: accuracy || 0,
          color: '#0b5ed7',
          fillColor: '#0b5ed7',
          fillOpacity: 0.1,
          weight: 1
        }).addTo(map);
      } else {
        userMarker.setLatLng(latlng);
        accuracyCircle.setLatLng(latlng).setRadius(accuracy || 0);
      }

      // Heading arrow (if heading is a number 0..360)
      if (typeof heading === 'number' && !Number.isNaN(heading) && speed && speed > 0.2) {
        const length = 25; // meters
        const dest = destinationPoint(latitude, longitude, heading, length);
        const latlng2 = [dest.lat, dest.lng];

        if (!headingArrow) {
          headingArrow = L.polyline([latlng, latlng2], { color: '#0b5ed7', weight: 2 }).addTo(map);
        } else {
          headingArrow.setLatLngs([latlng, latlng2]);
        }
      } else if (headingArrow) {
        headingArrow.remove();
        headingArrow = null;
      }

      useMyPosBtn.disabled = false;
      recenterBtn.disabled = false;
    }

    // --- Geolocation watch ---
    function startTracking() {
      if (!('geolocation' in navigator)) {
        setStatus('Geolocation not supported');
        return;
      }
      if (watchId !== null) return;

      setStatus('Requesting location...');
      watchId = navigator.geolocation.watchPosition(
        (pos) => {
          updateUserPosition(pos);
          const latlng = [pos.coords.latitude, pos.coords.longitude];
          // First fix: fit map to a nice zoom if still default
          if (!map._userHasMoved) {
            map.setView(latlng, Math.max(map.getZoom(), 16), { animate: true });
          }
          setStatus(`Fix: ${latlng[0].toFixed(5)}, ${latlng[1].toFixed(5)} ±${Math.round(pos.coords.accuracy)}m`);
        },
        (err) => {
          setStatus('Error: ' + err.message);
          console.error(err);
        },
        {
          enableHighAccuracy: true, // try GPS
          maximumAge: 5000,         // accept up to 5s cached
          timeout: 20000            // 20s timeout
        }
      );

      startBtn.disabled = true;
      stopBtn.disabled = false;
    }

    function stopTracking() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
        setStatus('Tracking stopped');
      }
      startBtn.disabled = false;
      stopBtn.disabled = true;
      // Keep layers on map so you can still recenter/use coords
    }

    // --- Circle handling ---
    function addCircleAt(lat, lng, radiusMeters) {
      if (!Number.isFinite(lat) || !Number.isFinite(lng) || !Number.isFinite(radiusMeters) || radiusMeters <= 0) {
        alert('Please provide valid latitude, longitude, and positive radius in meters.');
        return;
      }
      const circle = L.circle([lat, lng], {
        radius: radiusMeters,
        color: '#d63384',
        fillColor: '#d63384',
        fillOpacity: 0.1,
        weight: 2
      }).addTo(geofenceGroup);

      // Optional label
      circle.bindPopup(`Circle<br>Lat: ${lat.toFixed(5)}<br>Lng: ${lng.toFixed(5)}<br>R: ${Math.round(radiusMeters)} m`);

      // Fit bounds if this is the first circle
      if (geofenceGroup.getLayers().length === 1) {
        map.fitBounds(geofenceGroup.getBounds().pad(0.25));
      }
    }

    // Long-press to add a circle where you press
    let pressTimer = null;
    map.on('mousedown touchstart', (e) => {
      pressTimer = setTimeout(() => {
        const r = parseFloat(radiusInput.value) || 100;
        addCircleAt(e.latlng.lat, e.latlng.lng, r);
      }, 600); // long-press threshold (ms)
    });
    map.on('mouseup touchend dragstart move', () => {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    });

    // Track map movement to avoid re-centering after user drags
    map.on('movestart', () => { map._userHasMoved = true; });

    // Wire up controls
    document.getElementById('start').addEventListener('click', startTracking);
    document.getElementById('stop').addEventListener('click', stopTracking);
    document.getElementById('recenter').addEventListener('click', () => {
      if (userMarker) { map.setView(userMarker.getLatLng(), Math.max(map.getZoom(), 16), { animate: true }); }
    });

    document.getElementById('add-circle').addEventListener('click', () => {
      const lat = parseFloat(latInput.value);
      const lng = parseFloat(lngInput.value);
      const rad = parseFloat(radiusInput.value);
      addCircleAt(lat, lng, rad);
    });

    document.getElementById('clear-circles').addEventListener('click', () => {
      geofenceGroup.clearLayers();
    });

    document.getElementById('use-my-pos').addEventListener('click', () => {
      if (!userMarker) return;
      const { lat, lng } = userMarker.getLatLng();
      latInput.value = lat.toFixed(6);
      lngInput.value = lng.toFixed(6);
    });

    // Start immediately for convenience (you can remove this if you prefer manual)
    startTracking();

    // Keep map sized correctly as mobile UI changes
    ['orientationchange', 'resize', 'visibilitychange'].forEach(evt => {
      window.addEventListener(evt, () => setTimeout(() => map.invalidateSize(), 200));
    });

    // Inputs/refs used above
    const statusEl2 = statusEl; // (kept to avoid accidental removal)
  </script>
</body>
</html>

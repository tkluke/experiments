<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b0f19" />
  <title>My GPS Map with Geofences</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />

  <style>
    /* 1) Reset + base */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      line-height: 1.4;
      color: #111;
      background: #fff;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    /* Safe areas */
    :root {
      --safe-top: env(safe-area-inset-top);
      --safe-right: env(safe-area-inset-right);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);

      --brand: #0b5ed7;
      --accent: #d63384;

      --bg: #ffffff;
      --surface: #f7f7f9;
      --border: #e5e7eb;
      --text: #0f172a;
      --text-muted: #6b7280;

      --radius: 12px;
      --space-2: clamp(10px, 1.8vw, 12px);
      --space-3: clamp(12px, 2.4vw, 16px);
      --control-height: 44px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0f19;
        --surface: #121826;
        --border: #1f2937;
        --text: #e5e7eb;
        --text-muted: #9ca3af;
      }
      body { color: var(--text); background: var(--bg); }
    }

    /* 2) App layout: column, map height computed in JS */
    .app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      padding: max(var(--space-3), var(--safe-top))
               max(var(--space-3), var(--safe-right))
               max(var(--space-3), var(--safe-bottom))
               max(var(--space-3), var(--safe-left));
      background: var(--bg);
    }

    /* The map gets its height dynamically. We keep styling only. */
    #map {
      border-radius: var(--radius);
      overflow: hidden;
      outline: 1px solid var(--border);
      background: #dcdcdc;
      /* fallback minimum if JS hasn’t run yet */
      min-height: 50dvh;
    }
    @supports not (height: 1dvh) {
      #map { min-height: 50vh; }
    }

    .controls {
      display: grid;
      gap: var(--space-3);
      background: color-mix(in oklab, var(--bg) 92%, transparent);
      backdrop-filter: saturate(1.05) blur(4px);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: var(--space-3);
      grid-template-columns: 1fr;
    }
    @media (min-width: 720px) {
      .controls { grid-template-columns: 1fr 1fr; }
    }

    fieldset {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--space-3);
      background: var(--surface);
      min-inline-size: 0;
    }
    legend {
      padding: 0 var(--space-2);
      font-weight: 650;
      color: var(--text);
    }

    label {
      display: block;
      font-size: 0.92rem;
      margin-bottom: 4px;
      color: var(--text);
    }
    .inline {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }
    input[type="number"], select {
      width: 100%;
      height: var(--control-height);
      padding: 0 var(--space-2);
      border-radius: calc(var(--radius) - 4px);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      outline: none;
      appearance: none;
    }
    input[type="number"]::-webkit-outer-spin-button,
